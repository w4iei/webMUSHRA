testname: "Marcussen AB Batch 01 (Short Demo - 10 trials)"
testId: "marcussen_batch_01_short"
bufferSize: 2048
stopOnErrors: true
showButtonPreviousPage: true
language: "en"
remoteService: "service/write.php"
allowedPasswords:
  - "marcussen"
  - "hans"
  - "timbre"

pages:
  - type: generic
    id: "intro"
    name: "Instructions"
    content: "Marcussen listening test batch 01.<br/><br/>Each trial presents two audio files, item 1 and item 2. Rate how different they sound on a scale from 1 to 7, where 1 means most similar and 7 means incredibly different.<br/><br/>Keyboard shortcuts: <strong>Q</strong> plays item 1, <strong>W</strong> plays item 2, <strong>E</strong> plays item 1 then item 2, <strong>Space</strong> pauses playback, <strong>1-7</strong> selects the distance rating, and <strong>Cmd/Ctrl+Enter</strong> advances while the comment box is focused.<br/><br/>This batch contains 10 trials."
  - type: volume
    id: "volume"
    name: "Volume"
    content: "Adjust to a comfortable listening level before starting the trials."
    stimulus: "configs/resources/audio/marcussen_batches/batch_01/trial_001_pair_1433_item_1.wav"
    defaultVolume: 0.5
  - type: paired_distance
    id: "1433"
    name: "Trial 001"
    content: "Family: Principals<br/>Division: Main Division<br/>Registration: P8+O4<br/>Pitch: c2<br/>Microphone: Close"
