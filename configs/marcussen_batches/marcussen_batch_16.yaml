testname: "Marcussen AB Batch 16"
testId: "marcussen_batch_16"
bufferSize: 2048
stopOnErrors: true
showButtonPreviousPage: true
language: "en"
remoteService: "service/write.php"

pages:
  - type: generic
    id: "intro"
    name: "Instructions"
    content: "Marcussen listening test batch 16.<br/><br/>Each trial presents two audio files, item 1 and item 2. Rate how different they sound on a scale from 1 to 7, where 1 means most similar and 7 means incredibly different.<br/><br/>Keyboard shortcuts: <strong>Q</strong> plays item 1, <strong>W</strong> plays item 2, <strong>E</strong> plays item 1 then item 2, <strong>Space</strong> pauses playback, <strong>1-7</strong> selects the distance rating, and <strong>Cmd/Ctrl+Enter</strong> advances while the comment box is focused.<br/><br/>This batch contains 68 trials."
  - type: volume
    id: "volume"
    name: "Volume"
    content: "Adjust to a comfortable listening level before starting the trials."
    stimulus: "configs/resources/audio/marcussen_batches/batch_16/trial_001_pair_1320_item_1.wav"
