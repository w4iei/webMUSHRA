testname: "Marcussen AB Batch 09"
testId: "marcussen_batch_09"
bufferSize: 2048
stopOnErrors: true
showButtonPreviousPage: true
language: "en"
remoteService: "service/write.php"
allowedPasswords:
  - "marcussen"
  - "hans"
  - "timbre"

pages:
  - type: generic
    id: "consent_info"
    name: "Consent"
    content: "<p>I hereby declare that I have been clearly informed about the research Perceptual Similarity of Organ Timbre: Linking Listener Judgments to Computational Metrics at the University of Amsterdam, Music Cognition Group, conducted by Noah Jaffe under supervision of Ashley Burgoyne at the University of Amsterdam and Hans Fidom at the Vrij Universiteit Amsterdam as described in the information brochure. My questions have been answered to my satisfaction.</p><p>I realise that participation in this research is on an entirely voluntary basis. I retain the right to revoke this consent without having to provide any reasons for my decision. I am aware that I am entitled to discontinue the research at any time, and that I can always withdraw my consent after the research has ended. If I decide to stop or withdraw my consent, all the information gathered up until then will be permanently deleted.</p><p>If my research results are used in scientific publications or made public in any other way, they will be fully anonymised. My personal information may not be viewed by third parties.</p><p>If I need any further information on the research, now or in the future, I can contact Noah Jaffe (phone number: +31 06 29 38 89 41; e-mail: n.jaffe@uva.nl; Spuistraat 134, 1012 VB Amsterdam, The Netherlands.</p><p>If I have any complaints regarding this research, I can contact the secretary of the Ethics Committee of the Faculty of Humanities of the University of Amsterdam: commissie-ethiek-fgw@uva.nl; Binnengasthuisstraat 9, 1012 ZA Amsterdam, The Netherlands.</p><p><strong>By clicking next, I consent to participate in this research</strong></p>"
  - type: generic
    id: "intro"
    name: "Instructions"
    content: "Marcussen listening test batch 09.<br/><br/>Each trial presents two audio files, item 1 and item 2. Rate how different they sound on a scale from 1 to 7, where 1 means most similar and 7 means incredibly different.<br/><br/>Keyboard shortcuts: <strong>Q</strong> plays item 1, <strong>W</strong> plays item 2, <strong>E</strong> plays item 1 then item 2, <strong>Space</strong> pauses playback, <strong>1-7</strong> selects the distance rating, and <strong>Cmd/Ctrl+Enter</strong> advances while the comment box is focused.<br/><br/>This batch begins with 2 practice example(s) that are not saved, followed by 68 scored trials."
  - type: volume
    id: "volume"
    name: "Volume"
    content: "Adjust to a comfortable listening level before starting the examples and trials."
    stimulus: "configs/resources/audio/marcussen_batches/batch_09/example_001_pair_2344_item_1.wav"
    defaultVolume: 0.5
  - type: paired_distance
    id: "example_001_pair_2344"
    name: "Example 001"
    content: "Practice example: these two sounds come from the same pipe, so a rating near 1 is expected."
    storeResults: false
    stimuli:
      1: "configs/resources/audio/marcussen_batches/batch_09/example_001_pair_2344_item_1.wav"
      2: "configs/resources/audio/marcussen_batches/batch_09/example_001_pair_2344_item_2.wav"
  - type: paired_distance
    id: "example_002_pair_2577"
    name: "Example 002"
    content: "Practice example: these two sounds come from the same organ but contrasting stops, so a high distance rating is expected."
    storeResults: false
    stimuli:
      1: "configs/resources/audio/marcussen_batches/batch_09/example_002_pair_2577_item_1.wav"
      2: "configs/resources/audio/marcussen_batches/batch_09/example_002_pair_2577_item_2.wav"
